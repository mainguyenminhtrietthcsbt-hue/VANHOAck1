Câu1. 下列何者為聯含國世界衛生組織（WHO）對於「健康」的積極定義？
（A）身體沒有疾病及失能
/(B）生理、心理及社交三方面的平衡健全狀態
（C）沒有心理失常且能應付日常生活
（D） 身體呈現不虛弱的狀態。
Câu 2.Moch（1998）提出「疾病之中亦有健康（health with in illness）」，是指何種概念？
（A）有病即是不健康
（B）健康是指生理沒有疾病
/(C）疾病與健康是會並存的
（D）殘障就是不健康。
Câu 3.有關健康與疾病概念之敘述，下列何者正確？
（A）二者是一個動態且絕對的關係
/(B）個證在此一連紙線上的位置會受內外在環挽的影灣
（C）是一個明確、客觀且可測量的狀態
（D）二者都有明確且一致性的定義。
Câu 4. 有關「健康促進」的敘述中，下列何者有誤？
（A）來自於西元 1986 年渥太華憲章
（B）目的在於人尚未生病前，便設法降低或避免致病原因的發生
（C）主要在促進及維護個人的健康狀態
/(D）只在學校中進行健康促進活動。
Câu 5.何者為健康的生活型態？
（A）多購買維生素等保健食品服用
（B）為更好的生活要加班熬夜
/(C）養成開車繫安全帶習慣
（D）没事待在家裡以免發生意外。
Câu 6.影響健康的因素中，以下何項是「環境因素」？
/(A）空氣汙染
（B）蠶豆症
（C）醫療健保政策
（D）吸菸。
Câu 7.近年我國十大死因首位是：
（A）高血壓
/(B）惡性腫瘤
（C）事故傷害
（D）慢性肝病及肝硬化。
Câu 8.從十大死因之變遷可得知目前臺灣常見的死因特色為：
（A）以意外傷害為主
（B）多為單一病因
（C）治癒而非控制疾病
/(D）預防勝於治療之原則。
Câu 9.根據聯合國世界衛生組織（WHO）的定義，65歲以上人口為老年人，當老年人口占所有人口 7%以上，這個社會便稱為何者？
（A）老化社會
（B）高階層社會
/(C）高齡化社會
（D）超高齡化社會。
Câu 10.在人口老化的社會結構中，下列哪兩種情形會伴隨增加？
/(A）勞動力不足與退休年齡延長
（B）幼齡人口比例與生育率提高
（C）退休年齡提早與養兒防老日趨盛行
（D）青年人口比例增加與勞動力充足。
Câu 1.關於下列癌症與危險因子的配對，何者正確？
（A）大腸癌：高纖蔬果
（B）口腔癌：高脂肪飲食
/(C）子宮頸癌：病毒感染
（D）乳癌：酗酒。
Câu 2.有關胃癌的敘述，下列何者錯誤？
（A）為台灣癌整死因第1 位
（B）二手菸被世界衛生組織視為「頭號致癌物質」
（C）長期性的乾咳是常見症狀
/(D）政府補助50 歲以上至未滿75歲民眾每2年1次胸部X光檢查。
Câu 3.預防肝癌發生的方法何者為非？
（A）不酗酒
/(B）不嚼檳榔
（C）食用妥善儲存的新鮮花生
（D）注射疫苗。
Câu 4.關於結腸直腸癌病因的敘述，下列何者錯誤？
（A）大腸息肉
（B）發炎性腸病變 
/(C）飲食習慣攝取富含植物性蛋白食物
（D）飲食習慣缺乏高纖維食物與蔬菜。 
Câu 5.有關胃癌的敘述，下列何者錯誤？
（A）多發生在40歲之後
（B）可能與幽門桿菌感染有關
/(C）患者有頭痛、高血壓的症
（D）應減少食用醃製類食物。
Câu 6.何者為子宮頸癌的危險因子？
/(A）較早有性經驗
（B）糖尿病
（C）單一性伴侶
（D）未生育。
Câu 7.以下何者可能是致癌的危險因子
（1）常吃油炸食物（2）均衡飲食（3）經常酗酒（4）吃來路不明的減肥藥（5）家中有長輩罹患癌症（6）爬山。?
（A）（1）（②）（3）（4）
(B) (2)(3)(4)(5)
/(C) (1)(3)(4)(5)
(D) (1)(3)(5) (6) •
Câu 8.下列有幾項為常見的癌症危險訊號:（1）糞便為血便（2）皮膚傷口久不癒合或疣有新近變化（3）維持標準體重（4）吞嚥困難或咳血（5）體重突然減輕超過一成?
（A）2項
（B）3項
/(C）4項
（D）5項。
Câu 9.篩檢可以早期發現癌病變、早期治療，國民健康署提供30歲以上，有嚼食檳椰者，每幾年一次口腔黏膜檢查？
（A）1年
/(B）2年
（C）3年
（D）5年。
Câu 10.有關癌症的敘述，何者正確?
/(A）定期做癌症篩檢可以達到早期發現、早期治療的效果
（B）癌症初期都有明顯症狀，注意身體的變化，盡早治療，效果愈好
（C）癌症又稱惡性腫瘤，只有出現在身體特定的部位或器官
（D）施打子宮頸癌的疫苗後，可確保日後不會罹患子宮頸癌。
Câu 1.下列何者不是我國評估代謝症候群（metabolic syndrome）的指標?
/(A） BMI≥27
（B）腰圍：男性≥90cm、女性≥80cm
（C）收縮血壓≥130mmHg/舒張血壓≥v85mmHg
（D）HDL 膽固醇：男性<40mg/dL、女性<50mg/dL。
Câu 2.台灣十大死因中，哪一項與代謝症侯群無密切相關？
（A）心臟疾病
（B）腦血管疾病
/(C）癌症
（D）糖尿病。
Câu 3.以下何者是代謝症候群的致病因子？
（A）肥胖
（B）胰島素阻抗增加
（C）腫瘤壤死因子-a（TNF-a）
/(D）以上皆是。
Câu 4.冠心病是一種常見的心臟病，起因是負責心臟氧氣與養分的哪一條血管出了問題？
（A）頸動脈
（B）上腔大動脈
（C）肺動脈
/(D）冠狀動脈。
Câu 5.心血管疾病就是人體的的循環系統出現了異常，請問其範圍不包含下列何者？
（A）心臟
/(B）腎臟
（C）血液
（D）血管。
Câu 6.下列有關心血管疾病的敘述，錯誤的為何？
/(A）因近年來健康意識提升，已不在十大死因之中
（B）併發症有許多，常見的有冠心病、高血壓、腦中風
（C）可能因尼古丁或不愛運動導致血管硬化有關
（D）飲食中攝取較多的膽固醇會有影響。
Câu 7.糖尿病發生原因，主要是因為何種因素？
（A）攝取過多糖分
/(B）胰島素功能異常
（C）消化功能欠佳
（D）攝取含糖食物。
Câu 8.下列何者容易導致腎臟病？
（A）多喝開水
（B）血壓過低
（C）環境過於潮濕
/(D）隨意服用藥物或偏方。
Câu 9.下列哪一個不是常見的癌症危險訊號？
/(A）肥胖
（B）喉嚨長久嘶啞或咳嗽
（C）不正常的腫塊
（D）皮膚上的痣形狀、顏色改變。
Câu 10.癌症的高危險因子有：（1）吸菸（2）有家族病史（3）運動（4）高脂肪飲食（5）嚼檳榔。?
（A）(1)(2)(3)(5)  
/(B) (1)(2)(4)(5)
(C) (1)(3)(4)(5)   
(D) (2)(3)(4)(5) •
