Câu 1. 人際溝通至少有三個重要功能，但不包括何種功能？
a. 心理功能
/b. 生理功能
c. 社會功能
d. 決策功能

Câu 2. 「追求安全、穩定與躲避生理與心理傷害之需求」是指那一種需求？
a. 生理需求
/b. 安全需求
c. 歸屬需求
d. 自尊需求

Câu 3. 「有效參與多元社會的需求」是指那一種需求？
a. 生理需求
b. 安全需求
/c. 溝通需求
d. 歸屬需求

Câu 4. 「人與人之間的關係」是什麼關係的最簡單定義？
a. 己際關係
/b. 人際關係
c. 親子關係
d. 性別關係

Câu 5. 「將訊息從某個人傳遞給另一個人的動態歷程」即是：
a. 認知
b. 關係
/c. 溝通
d. 情緒

Câu 6. 下列何者不是溝通的主要特性？
a. 互動性
b. 媒介性
c. 目標性
/d. 片面性

Câu 7. 「溝通過程中有關思想與情感的阻礙」是指那一種干擾？
a. 外在干擾

c. 語意干擾
d. 環境干擾

Câu 8. 「藉由某種符號媒介，而將一個概念或訊息由一個人傳遞到另一個人的過程」指涉什麼溝通？
a. 自我溝通

c. 大眾溝通
d. 物我溝通

Câu 9. 下列何者不屬於非語言溝通？
a. 微笑
b. 臉部表情
/c. 演講
d. 手勢動作

Câu 10. 「溝通是直線或單向的過程，且是從個人到另一個人所產生的動作」是那一模型的說法？
/a. 線型模型
b. 三角模型
c. 互動模型
d. 交流模型

/a. 認識的人

c. 朋友
d. 親密的人

a. 仇人
b. 敵人
c. 長輩
/d. 朋友

a. 他群感
/b. 我群感
c. 剝奪感
d. 歧視感

Câu 4. 什麼是人際應有的情感，也是做人的基本需求？
a. 親情
/b. 人情
c. 心情
d. 愛情

Câu 5. 下列何者不屬於人際關係的主要特性？
a. 變動性
b. 階段性

d. 程度性

Câu 6. 「人際關係的多向度發展，而非單一面向的組成」是指什麼特性？
/a. 多樣性

c. 變動性
d. 階段性

d. 未知自我

/d. 以上皆是

b. 溝通之發展
c. 合理性
d. 搭橋梁

c. 自我發展
d. 自我對話

c. 自我發展
d. 自我對話

d. 語言溝通
